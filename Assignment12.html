<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 12</title>
</head>
<body>
    <h1>HTML Multimedia - Audio & Video</h1>

    <h2>1. Simple Audio</h2>
    <audio controls>
        <source src="./sentinel-by-scott-buckley.mp3" type="audio/mpeg">
    </audio>
    <br><br>

    <h2>2. Autoplay Audio</h2>
    <audio autoplay muted controls>
        <source src="./sentinel-by-scott-buckley.mp3" type="audio/mpeg">
    </audio>
    <br><br>

    <h2>3. Loop Audio</h2>
    <audio controls loop>
        <source src="./sentinel-by-scott-buckley.mp3" type="audio/mpeg">
    </audio>
    <br><br>
    <h2>1. Simple Video</h2>
    <video width="400" height="300" controls>
        <source src="12512807-uhd_3840_2160_25fps.mp4" type="video/mp4">
    </video>
    <br><br>
    <h2>2. Autoplay Video</h2>
    <video width="400" height="300" autoplay muted controls>
        <source src="12512807-uhd_3840_2160_25fps.mp4" type="video/mp4">
    </video>
    <br><br>
    <h2>3. Loop Video</h2>
    <video width="400" height="300" controls loop>
        <source src="12512807-uhd_3840_2160_25fps.mp4" type="video/mp4">
    </video>
    <br><br>
    <h2>4. Video with poster</h2>
    <video width="400" height="300" controls poster="virat.jpg">
        <source src="12512807-uhd_3840_2160_25fps.mp4" type="video/mp4">
    </video>
    <br><br>

    <h2>5. Embedded Video </h2>
    <iframe width="400" height="300" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    <br><br>
    </body>
    </html>
